
<!DOCTYPE html>
<html>
<head>
    <title>Employee Pagination</title>

    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background: #f5f6fa;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
        }

        th {
            background: #2f3640;
            color: white;
        }

        .pagination {
            margin-top: 20px;
            text-align: center;
        }

        button {
            margin: 5px;
            padding: 8px 12px;
            border: none;
            background: #40739e;
            color: white;
            cursor: pointer;
        }

        button.active {
            background: #e84118;
        }
    </style>
</head>

<body>

<h2>Employee Records</h2>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Salary</th>
			
			<th>Mobile</th>

        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<div class="pagination" id="pagination"></div>

<script>

let employees = [];      // Store ALL data
let currentPage = 1;
const pageSize = 10;

fetch("/employees")
    .then(res => res.json())
    .then(data => {
        employees = data;
        renderTable();
        renderPagination();
    });

function renderTable() {

    const body = document.getElementById("tableBody");
    body.innerHTML = "";

    const start = (currentPage - 1) * pageSize;
    const end = start + pageSize;

    const pageData = employees.slice(start, end);

    pageData.forEach(emp => {
        body.innerHTML += `
            <tr>
                <td>${emp.id}</td>
                <td>${emp.name}</td>
                <td>${emp.email}</td>
                <td>₹${emp.salary}</td>
				<td>${emp.mobile}</td>

            </tr>
        `;
    });
}

function renderPagination() {

    const totalPages = Math.ceil(employees.length / pageSize);
    const container = document.getElementById("pagination");
    container.innerHTML = "";

    container.innerHTML += `
        <button onclick="prevPage()">Prev</button>
    `;

    for (let i = 1; i <= totalPages; i++) {
        container.innerHTML += `
            <button onclick="goToPage(${i})"
                    class="${i === currentPage ? 'active' : ''}">
                ${i}
            </button>
        `;
    }

    container.innerHTML += `
        <button onclick="nextPage()">Next</button>
    `;
}

function goToPage(page) {
    currentPage = page;
    renderTable();
    renderPagination();
}

function prevPage() {
    if (currentPage > 1) {
        currentPage--;
        renderTable();
        renderPagination();
    }
}

function nextPage() {
    const totalPages = Math.ceil(employees.length / pageSize);
    if (currentPage < totalPages) {
        currentPage++;
        renderTable();
        renderPagination();
    }
}

</script>

</body>
</html>

    prevBtn.disabled = currentPage <= 0;

}
